<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leet Metric</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>💻 Leet Metric</h1>
      <p>Enter your username below:</p>
      <div class="user-input-container">
        <input type="text" placeholder="Enter your username" id="user-input" />
        <button id="search-btn">🔍 Search</button>
      </div>

      <div class="stats-container">
        <div class="progress">
          <div class="progress-items circle">
            <div class="easy-progress">
              <span id="easy-label"></span>
              Easy
            </div>
          </div>

          <div class="progress-items circle">
            <div class="medium-progress">
              <span id="medium-label"></span>
              medium
            </div>
          </div>

          <div class="progress-items circle">
            <div class="hard-progress">
              <span id="hard-label"></span>
              Hard
            </div>
          </div>
        </div>
        <div class="stats-card">
          <!-- Directly populate card ffrom js  -->
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
